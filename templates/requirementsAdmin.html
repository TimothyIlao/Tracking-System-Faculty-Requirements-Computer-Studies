<!DOCTYPE html>
<html>
<head>
    <title>Faculty List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboardAdmin.css') }}">

    <!-- Icons -->
     <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<script>
function updateDateTime() {
    const now = new Date();

    const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    };

    const date = now.toLocaleDateString(undefined, options);
    const time = now.toLocaleTimeString();

    document.getElementById("datetime").innerHTML = `${date} • ${time}`;
}

// Update every second
setInterval(updateDateTime, 1000);

// Initial call
updateDateTime();

if (!document.cookie.includes("session")) {
    window.location.href = "/logintab";
}
</script>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    
    <!-- TOP SECTION -->
    <div class="sidebar-top">
        <button id="menu-btn">☰</button>
    </div>

    <a href="/dashboardAdmin">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
    </a>
    <!-- MENU -->

    <a href="/facultylistAdmin">
        <i class="fas fa-user"></i>
        <span>Faculty List</span>
    </a>
    <a href="/">
        <i class="fas fa-chalkboard-teacher"></i>
        <span>Class Assignment</span>
    </a>
    <a class="active">
        <i class="fas fa-list"></i>
        <span>Requirements</span>
    </a>
    <a href="/submissionmonitoringAdmin">
        <i class="fas fa-file-alt"></i>
        <span>Submission Monitoring</span>
    </a>
    <a href="/logout">
        <i class="fas fa-sign-out-alt"></i>
        <span>Logout</span>
    </a>
    
    <!-- PROFILE (BOTTOM) -->
    <div class="sidebar-profile">
        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Profile">
        <div class="profile-info">
            <span class="name">Juan Dela Cruz</span>
            <span class="role">Admin</span>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main" id="main">
    
<!-- TOPBAR -->
<div class="topbar">
    <h2 style="text-align:center;">Requirements List</h2>

    <!-- RIGHT SIDE -->
    <div class="datetime" id="datetime"></div>
</div>

<div class="content">
    <div class="header">
        <h2>Department of Computer Studies</h2>
        <p>Academic Year: 2025–2026 | Semester: First</p>
    </div>

 <table>
        <thead>
            <tr>
                <th>Requirement_ID</th>
                <th>Requirement Name</th>
            </tr>
        </thead>
        <tbody>
            {% for t in rows %}
            <tr>
                <td>{{ t[0] }}</td>
                <td>{{ t[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
        </div>
</div>
    
    </div>
    
</div>

<script>
    const menuBtn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main");

    menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
        main.classList.toggle("collapsed");
    });
</script>

</body>
</html>
